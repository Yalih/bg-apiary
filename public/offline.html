<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f2a900" />
    <title>BG Apiary v2.6 - offline</title>
    <style>
      :root { color-scheme: light dark; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: linear-gradient(135deg, #fff8e1, #f2a900); color: #1d1a14; }
      main { width: min(520px, calc(100% - 32px)); padding: 32px; border-radius: 28px; background: rgba(255,253,247,.9); box-shadow: 0 24px 70px rgba(29,26,20,.22); }
      strong { display: inline-grid; place-items: center; width: 52px; height: 52px; border-radius: 18px; background: #1d1a14; color: #fff8e1; }
      h1 { margin: 18px 0 8px; font-size: clamp(2rem, 8vw, 3.4rem); line-height: .95; letter-spacing: -.06em; }
      p { margin: 0; color: #5c503d; font-weight: 700; line-height: 1.6; }
      a { display: inline-flex; margin-top: 22px; padding: 12px 16px; border-radius: 999px; background: #1d1a14; color: #fff8e1; font-weight: 900; text-decoration: none; }
    </style>
  </head>
  <body>
    <main>
      <strong>BG</strong>
      <h1>Tryb offline</h1>
      <p>Brak połączenia z siecią. BG Apiary zachowa ostatnio zapisane dane lokalne, ale odświeżenie aplikacji wymaga internetu.</p>
      <a href="/">Spróbuj ponownie</a>
    </main>
  </body>
</html>
