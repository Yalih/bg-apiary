<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffb703" />
    <title>BG Apiary v2.0.8 - offline</title>
    <style>
      :root {
        color-scheme: light dark;
        --honey: #ffb703;
        --graphite: #1d1d1f;
        --surface: #fff8e6;
        --surface-dark: #111827;
        --text: #262018;
        --text-dark: #f8fafc;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, rgba(255, 183, 3, 0.25), transparent 36%), var(--surface);
        color: var(--text);
      }
      main {
        width: min(520px, 100%);
        padding: 32px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid rgba(29, 29, 31, 0.1);
        box-shadow: 0 24px 80px rgba(29, 29, 31, 0.14);
        text-align: center;
      }
      img { width: 72px; height: 72px; margin-bottom: 16px; }
      h1 { margin: 0 0 12px; font-size: clamp(1.8rem, 7vw, 2.6rem); }
      p { margin: 0 0 20px; line-height: 1.6; color: #5f4d2f; }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 20px;
        border-radius: 999px;
        background: var(--honey);
        color: #1f1600;
        font-weight: 800;
        text-decoration: none;
      }
      @media (prefers-color-scheme: dark) {
        body { background: radial-gradient(circle at top, rgba(255, 183, 3, 0.16), transparent 36%), var(--surface-dark); color: var(--text-dark); }
        main { background: rgba(17, 24, 39, 0.88); border-color: rgba(255, 255, 255, 0.1); }
        p { color: #d7c6a1; }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/brand/bg-apiary-icon.svg" alt="" />
      <h1>Jesteś offline</h1>
      <p>BG Apiary nie może teraz połączyć się z internetem. Podstawowe pliki aplikacji są zachowane, a pełna synchronizacja wróci po odzyskaniu sieci.</p>
      <a href="/">Spróbuj ponownie</a>
    </main>
  </body>
</html>
