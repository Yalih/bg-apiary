services:
  postgres:
    image: postgres:16-alpine
    container_name: bg-apiary-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bg_apiary}
      POSTGRES_USER: ${POSTGRES_USER:-bg_apiary}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-db-password}
    volumes:
      - bg_apiary_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bg_apiary} -d ${POSTGRES_DB:-bg_apiary}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bg-apiary-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-4000}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      APP_VERSION: ${APP_VERSION:-1.0.0}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${API_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bg-apiary-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "8080:80"
    profiles:
      - docker-web

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: bg-apiary-pgadmin
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:5050:80"
    profiles:
      - tools

volumes:
  bg_apiary_postgres:
