services:
  postgres:
    image: postgres:16-alpine
    container_name: bg-apiary-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bg_apiary
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - bg_apiary_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bg_apiary"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bg-apiary-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bg_apiary?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-this-before-production-access-secret-bg-apiary}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-before-production-refresh-secret-bg-apiary}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://bgapiary.pro}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: bg-apiary-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@bgapiary.pro}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change-this-pgadmin-password}
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - bg_apiary_pgadmin_data:/var/lib/pgadmin

volumes:
  bg_apiary_postgres_data:
  bg_apiary_pgadmin_data:
