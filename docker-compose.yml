services:
  postgres:
    image: postgres:16-alpine
    container_name: bg-apiary-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bg_apiary
    ports:
      - "5432:5432"
    volumes:
      - bg_apiary_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bg_apiary"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bg-apiary-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bgapiary.pro
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - bg_apiary_pgadmin_data:/var/lib/pgadmin

volumes:
  bg_apiary_postgres_data:
  bg_apiary_pgadmin_data:
