name: Deploy BG Apiary

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: bg-apiary-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy BG Apiary
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Show environment
        run: |
          echo "Node: $(node -v)"
          echo "NPM : $(npm -v)"
          echo "PWD : $(pwd)"
          ls -la
          npm config get registry

      - name: Force public npm registry
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config delete proxy || true
          npm config delete https-proxy || true
          npm config delete cafile || true
          npm config get registry

      - name: Validate package lock
        run: |
          test -f package-lock.json
          if grep -R "applied-caas\|internal.api.openai" package-lock.json package.json .npmrc 2>/dev/null; then
            echo "package-lock.json contains an internal registry URL. Stop."
            exit 1
          fi
          echo "package-lock.json registry URLs are clean."

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --registry=https://registry.npmjs.org/

      - name: Build application
        run: npm run build

      - name: Verify dist
        run: |
          test -d dist
          test -f dist/index.html
          echo "===== dist ====="
          ls -la dist

      - name: Upload dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist/*"
          target: "/tmp/bg-apiary-dist"
          strip_components: 1
          rm: true
          timeout: 120s
          command_timeout: 300s

      - name: Publish on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 300s
          script: |
            set -e
            echo "=== BG Apiary deploy ==="
            sudo mkdir -p /var/www/html
            test -f /tmp/bg-apiary-dist/index.html
            sudo rm -rf /var/www/html/*
            sudo cp -r /tmp/bg-apiary-dist/* /var/www/html/
            sudo chown -R www-data:www-data /var/www/html
            sudo nginx -t
            sudo systemctl reload nginx
            echo "=== BG Apiary deployed successfully ==="
