services:
  postgres:
    image: postgres:16-alpine
    container_name: bg-apiary-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bg_apiary_user
      POSTGRES_PASSWORD: bg_apiary_password
      POSTGRES_DB: bg_apiary_dev
    ports:
      - "5432:5432"
    volumes:
      - bg_apiary_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bg_apiary_user -d bg_apiary_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: bg-apiary-backend
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: bg-apiary-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bgapiary.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  bg_apiary_postgres_data:
